name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit
        run: |
          bandit -r . \
            -x .venv,venv,.git,__pycache__

      - name: Run pip-audit
        run: |
          pip-audit